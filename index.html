<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom AI Apps</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    .grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 18px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      background: #334155;
    }

    .emoji {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .card p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <h1>📚 Classroom AI Apps</h1>
  <p class="subtitle">Interactive teaching apps organised by subject</p>

  <div class="grid">
    <div class="card">
      <div class="emoji">📖</div>
      <h2>English</h2>
      <p>Apps coming soon</p>
    </div>

    <div class="card">
      <div class="emoji">🌏</div>
      <h2>HSIE</h2>
      <p>Apps coming soon</p>
    </div>

    <div class="card">
      <div class="emoji">➕</div>
      <h2>Maths</h2>
      <p>Apps coming soon</p>
    </div>

    <div class="card">
      <div class="emoji">🏃</div>
      <h2>PDHPE</h2>
      <p>Apps coming soon</p>
    </div>

    <div class="card">
      <div class="emoji">✝️</div>
      <h2>Religion</h2>
      <p>Apps coming soon</p>
    </div>

    <div class="card">
      <div class="emoji">⭐</div>
      <h2>Wellbeing</h2>
      <p>Apps coming soon</p>
    </div>
  </div>
</body>
</html>
